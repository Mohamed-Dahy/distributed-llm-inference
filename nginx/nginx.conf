worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream gpu_workers {
        least_conn;

        # Replace these with the real IP addresses of your 4 worker laptops
        server WORKER_1_IP:8001;
        server WORKER_2_IP:8002;
        server WORKER_3_IP:8003;
        server WORKER_4_IP:8004;
    }

    server {
        listen 8080;

        location /process {
            proxy_pass http://gpu_workers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 30s;
            proxy_read_timeout 180s;

            proxy_next_upstream error timeout invalid_header http_500 non_idempotent;
            proxy_next_upstream_tries 4;
        }

        location /health {
            proxy_pass http://gpu_workers;
        }

        location /stats {
            proxy_pass http://gpu_workers;
        }

        location /simulate_failure {
            proxy_pass http://gpu_workers;
        }

        location /reset {
            proxy_pass http://gpu_workers;
        }

        location /revive {
            proxy_pass http://gpu_workers;
        }
    }
}
